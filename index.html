<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiMobil 64 - Cloud Live Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0d0f14; color: #f3f4f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass-card { background: rgba(18, 22, 31, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-6xl mx-auto flex justify-between items-center mb-8 glass-card p-4 rounded-2xl shadow-xl">
        <div class="flex items-center gap-3">
            <div id="logo-container" class="w-10 h-10 flex items-center justify-center bg-indigo-600/20 rounded-xl border border-indigo-500/30">
                <img id="main-logo" src="images/logo.png" alt="Logo" class="w-7 h-7 object-contain" onerror="document.getElementById('logo-container').innerHTML='🏎️'">
            </div>
            <div>
                <h1 class="text-xl font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400">BIMOBIL 64</h1>
                <p class="text-xs text-gray-400">Cloud Live Catalog System</p>
            </div>
        </div>
        <div class="flex items-center gap-3 glass-card px-4 py-2 rounded-xl border border-gray-800">
            <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
            <span class="text-xs font-semibold tracking-wide text-gray-300">CLOUD SYNC LIVE</span>
        </div>
    </header>

    <main class="max-w-6xl mx-auto">
        <section class="glass-card p-6 rounded-2xl border border-gray-800/60 mb-8">
            <h2 class="text-md font-bold mb-4 text-indigo-400 flex items-center gap-2"><i class="fa-solid fa-plus-circle"></i> Tambah Koleksi Baru</h2>
            <form id="diecast-form" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="name" placeholder="Nama Mobil (e.g. Nissan Skyline GT-R)" class="bg-gray-900/60 border border-gray-800 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-indigo-500 transition-all" required>
                <input type="text" id="manufacturer" placeholder="Produsen (e.g. Hot Wheels, Tomica)" class="bg-gray-900/60 border border-gray-800 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-indigo-500 transition-all">
                <div class="flex gap-2">
                    <input type="number" step="0.01" id="market_value" placeholder="Harga/Value" class="bg-gray-900/60 border border-gray-800 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-indigo-500 transition-all w-full">
                    <select id="currency" class="bg-gray-900 border border-gray-800 rounded-xl px-2 py-2.5 text-sm focus:outline-none text-gray-300">
                        <option value="USD">$ USD</option>
                        <option value="IDR">Rp IDR</option>
                    </select>
                </div>
                <input type="text" id="tags" placeholder="Tags (pisahkan dengan koma, e.g JDM, Premium)" class="bg-gray-900/60 border border-gray-800 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-indigo-500 transition-all md:col-span-2">
                <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 font-bold text-sm text-white rounded-xl py-2.5 transition-all shadow-lg shadow-indigo-600/20">Simpan Ke Cloud 🚀</button>
            </form>
        </section>

        <div class="flex justify-between items-center mb-6">
            <h2 class="text-lg font-black tracking-wide flex items-center gap-2"><i class="fa-solid fa-car-side text-indigo-400"></i> LIVE SHOWROOM</h2>
            <span id="counter" class="text-xs font-bold glass-card px-3 py-1.5 rounded-full text-indigo-300 border border-gray-800">0 Items</span>
        </div>
        
        <div id="showroom" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            </div>
    </main>

    <script>
        // KONEKSI INTI DATABASE ONLINE SUPABASE KAMU
        const SUPABASE_URL = "https://ciutjrhqioxogvkiaujg.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNpdXRqcmhxaW94b2d2a2lhdWpnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0NjE1OTksImV4cCI6MjA5ODAzNzU5OX0.UppRTLC78Hog9YShU0OrcCYh28kG2pVC0xLEmnVkQIs";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const form = document.getElementById('diecast-form');
        const showroom = document.getElementById('showroom');
        const counter = document.getElementById('counter');

        // AMBIL DATA LIVE DARI CLOUD
        async function fetchLiveShowroom() {
            showroom.innerHTML = `<div class="col-span-full text-center text-gray-500 text-sm py-12"><i class="fa-solid fa-circle-notch animate-spin text-xl mb-2 text-indigo-500"></i><br>Mengambil koleksi dari cloud...</div>`;
            
            const { data, error } = await supabase
                .from('diecasts')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                showroom.innerHTML = `<div class="col-span-full text-center text-red-400 text-sm py-12">Gagal koneksi cloud database.</div>`;
                return;
            }

            counter.innerText = `${data.length} Items`;
            if (data.length === 0) {
                showroom.innerHTML = `<div class="col-span-full text-center text-gray-500 text-sm py-12">Belum ada koleksi di cloud. Mulai input sekarang!</div>`;
                return;
            }

            showroom.innerHTML = '';
            data.forEach(item => {
                const tagBadges = item.tags ? item.tags.map(t => `<span class="bg-gray-800 text-gray-400 text-[10px] px-2 py-0.5 rounded font-medium">#${t.trim()}</span>`).join(' ') : '';
                const hargaFormatted = item.market_value ? (item.currency === 'IDR' ? 'Rp ' + Number(item.market_value).toLocaleString('id-ID') : '$' + item.market_value) : '-';

                const card = document.createElement('div');
                card.className = 'glass-card p-5 rounded-2xl relative border border-gray-800 hover:border-indigo-500/40 transition-all shadow-lg flex flex-col justify-between group';
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-3">
                            <span class="text-xs font-bold text-indigo-400 bg-indigo-900/30 px-2.5 py-1 rounded-lg border border-indigo-500/20 tracking-wider">${item.manufacturer || 'Unknown'}</span>
                            <button onclick="deleteItem(${item.id})" class="text-gray-600 hover:text-red-400 text-xs transition-all opacity-0 group-hover:opacity-100"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                        <h3 class="text-md font-extrabold tracking-wide text-white mb-2">${item.name}</h3>
                        <div class="flex flex-wrap gap-1 mb-4">${tagBadges}</div>
                    </div>
                    <div class="border-t border-gray-800/80 pt-3 flex justify-between items-center">
                        <span class="text-[11px] uppercase tracking-wider text-gray-500 font-bold">Market Value</span>
                        <span class="text-sm font-black text-emerald-400 font-mono">${hargaFormatted}</span>
                    </div>
                `;
                showroom.appendChild(card);
            });
        }

        // TAMBAH DATA MASUK KE CLOUD
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const manufacturer = document.getElementById('manufacturer').value;
            const market_value = document.getElementById('market_value').value;
            const currency = document.getElementById('currency').value;
            const tagsInput = document.getElementById('tags').value;
            const tags = tagsInput ? tagsInput.split(',') : [];

            const { error } = await supabase.from('diecasts').insert([
                { name, manufacturer, market_value: market_value ? parseFloat(market_value) : null, currency, tags }
            ]);

            if (error) {
                alert('Gagal menyimpan data ke cloud: ' + error.message);
            } else {
                form.reset();
                fetchLiveShowroom();
            }
        });

        // HAPUS DATA DARI CLOUD
        async function deleteItem(id) {
            if (confirm('Hapus item diecast ini dari cloud database?')) {
                const { error } = await supabase.from('diecasts').delete().eq('id', id);
                if (error) alert('Gagal menghapus: ' + error.message);
                else fetchLiveShowroom();
            }
        }

        // LOAD JALAN PERTAMA KALI
        fetchLiveShowroom();
    </script>
</body>
</html>
